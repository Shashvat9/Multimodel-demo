spring.application.name=demo-web

# Database (defaults to in-memory H2; override with DB_* environment variables for MySQL/Postgres, etc.)
spring.datasource.url=${DB_URL:jdbc:h2:mem:jwt;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=${JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=create-drop
# Ensure entities in the repository module are scanned
spring.jpa.packages-to-scan=com.example.demorepository.entity

# JPA
spring.jpa.show-sql=false
spring.h2.console.enabled=true

# JWT Configuration
# IMPORTANT: Override jwt.secret with a secure environment variable in production.
# Example: export JWT_SECRET=<your-base64-encoded-256-bit-key>
# The value below is for local development only and must NOT be used in production.
jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXZlcnktc2VjdXJlLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9u}
# Access token expiry: 15 minutes (ms)
jwt.access-token.expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
# Refresh token expiry: 7 days (ms)
jwt.refresh-token.expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}

spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=USER
