plugins {
    id 'java'
    id 'war'
    id 'org.springframework.boot'
}

dependencies {
    // Connect the web layer to the service layer
    implementation project(':demo-commons')
    implementation project(':demo-service')

    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    // JWT
    implementation 'io.jsonwebtoken:jjwt-api:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.6'

    runtimeOnly 'com.mysql:mysql-connector-j:9.6.0'
    runtimeOnly 'com.h2database:h2'

    providedRuntime 'org.springframework.boot:spring-boot-starter-tomcat'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'
}

// Ensure the WAR task is configured for your external Tomcat
war {
    archiveFileName = 'demo.war'
}

// WAR packaging drops some compile classpath entries (spring-web) from bootRun runtimeClasspath.
// Augmenting the classpath keeps required web classes available when running locally.
tasks.named('bootRun') {
    classpath += configurations.compileClasspath
}
